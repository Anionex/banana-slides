name: CI/CD Pipeline

# Single workflow: Test → Build → Deploy
# The commit check only turns green when ALL stages complete.
#
# Triggers:
# 1. Push to main/develop (code changes only, not *.md)
# 2. PR labeled with ready-for-test
# 3. Manual trigger
on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**/*.md'
  pull_request:
    types: [labeled]
    branches: [ main, develop ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/anionex/banana-slides-saas-backend
  FRONTEND_IMAGE: ghcr.io/anionex/banana-slides-saas-frontend

jobs:
  # ================================
  # Stage 1: Tests
  # ================================
  backend-unit-test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' && github.event.label.name == 'ready-for-test')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv package manager
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies (with test extras)
        run: |
          uv sync --extra test
        env:
          UV_INDEX_URL: https://pypi.org/simple

      - name: Run unit tests
        run: |
          cd backend
          uv run pytest tests/unit -v --cov=. --cov-report=xml --cov-report=term --cov-fail-under=35
        continue-on-error: false
        env:
          SKIP_EMAIL_VERIFICATION: true
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage

  backend-integration-test:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: backend-unit-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies (with test extras)
        run: uv sync --extra test

      - name: Run integration tests
        run: |
          cd backend
          uv run pytest tests/integration -v -m "not requires_service"
        env:
          TESTING: true
          SKIP_SERVICE_TESTS: true
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || 'mock-api-key-for-testing' }}
          SKIP_EMAIL_VERIFICATION: true
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint check
        run: |
          cd frontend
          npm run lint

      - name: Run unit tests
        run: |
          cd frontend
          npm test -- --run --coverage
        continue-on-error: false

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./frontend/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage

      - name: Build check
        run: |
          cd frontend
          npm run build

  docker-test:
    name: Docker Environment Tests
    runs-on: ubuntu-latest
    needs: [backend-integration-test, frontend-test]
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment variables
        run: |
          chmod +x scripts/setup-env-from-secrets.sh
          ./scripts/setup-env-from-secrets.sh
          sed -i 's/^AI_PROVIDER_FORMAT=.*/AI_PROVIDER_FORMAT=gemini/' .env || echo "AI_PROVIDER_FORMAT=gemini" >> .env
          echo "" >> .env
          echo "SKIP_EMAIL_VERIFICATION=true" >> .env
          echo "JWT_SECRET_KEY=test-jwt-secret-key-for-ci" >> .env
          echo "Environment configured (API keys hidden for security)"
        env:
          AI_PROVIDER_FORMAT: gemini
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_API_BASE: ${{ secrets.GOOGLE_API_BASE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          OPENAI_TIMEOUT: ${{ secrets.OPENAI_TIMEOUT }}
          OPENAI_MAX_RETRIES: ${{ secrets.OPENAI_MAX_RETRIES }}
          TEXT_MODEL: ${{ secrets.TEXT_MODEL }}
          IMAGE_MODEL: ${{ secrets.IMAGE_MODEL }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          FLASK_ENV: ${{ secrets.FLASK_ENV }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          MAX_DESCRIPTION_WORKERS: ${{ secrets.MAX_DESCRIPTION_WORKERS }}
          MAX_IMAGE_WORKERS: ${{ secrets.MAX_IMAGE_WORKERS }}
          MINERU_TOKEN: ${{ secrets.MINERU_TOKEN }}
          MINERU_API_BASE: ${{ secrets.MINERU_API_BASE }}
          IMAGE_CAPTION_MODEL: ${{ secrets.IMAGE_CAPTION_MODEL }}
          OUTPUT_LANGUAGE: ${{ secrets.OUTPUT_LANGUAGE }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY || 'test-jwt-secret-key-for-ci' }}
          SKIP_EMAIL_VERIFICATION: true
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'mock-resend-api-key' }}
          FRONTEND_URL: http://localhost:3000

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: |
          docker compose up -d
          echo "Waiting for services to be ready..."

      - name: Wait for services to be healthy
        run: |
          chmod +x scripts/wait-for-health.sh
          ./scripts/wait-for-health.sh http://localhost:5000/health 60 2
          ./scripts/wait-for-health.sh http://localhost:3000 60 2

      - name: Health check
        run: |
          chmod +x scripts/wait-for-health.sh
          echo "Checking backend..."
          ./scripts/wait-for-health.sh http://localhost:5000/health 60 2
          echo "Checking frontend..."
          ./scripts/wait-for-health.sh http://localhost:3000 60 2
          sleep 5
          if curl -s http://localhost:3000 | grep -q "蕉幻"; then
            echo "Frontend started successfully and content loaded"
          else
            echo "Warning: Frontend responding but content verification failed"
          fi

      - name: Run Docker environment tests
        run: |
          chmod +x scripts/test_docker_environment.sh
          AUTO_CLEANUP=false ./scripts/test_docker_environment.sh

      - name: Setup Node.js for frontend E2E tests
        if: env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies and Playwright
        if: env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing'
        run: |
          cd frontend
          npm ci
          npx playwright install --with-deps chromium

      - name: Check if E2E tests should run
        id: check_e2e
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "${{ secrets.GOOGLE_API_KEY }}" ] || [ "${{ secrets.GOOGLE_API_KEY }}" == "mock-api-key-for-testing" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Setup Python for backend API tests
        if: steps.check_e2e.outputs.skip != 'true' && env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv and backend dependencies
        if: steps.check_e2e.outputs.skip != 'true' && env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing'
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          . "$HOME/.cargo/env"
          uv sync --extra test

      - name: Run Quick API test (no AI, fast validation)
        if: steps.check_e2e.outputs.skip != 'true' && env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing'
        run: |
          . "$HOME/.cargo/env"
          cd backend
          uv run pytest tests/integration/test_api_full_flow.py::TestAPIFullFlow::test_quick_api_flow_no_ai -v -m "requires_service"
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SKIP_SERVICE_TESTS: false
        timeout-minutes: 5
        continue-on-error: false

      - name: Run Frontend UI E2E tests
        if: steps.check_e2e.outputs.skip != 'true' && env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing'
        run: |
          cd frontend
          npx playwright test ui-full-flow.spec.ts --workers=1
        env:
          CI: true
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        timeout-minutes: 25
        continue-on-error: false

      - name: Upload Frontend E2E test reports
        if: always() && (env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Frontend E2E failure screenshots
        if: failure() && (env.GOOGLE_API_KEY != '' && env.GOOGLE_API_KEY != 'mock-api-key-for-testing')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: frontend/test-results/
          retention-days: 7

      - name: View container logs (on failure)
        if: failure()
        run: |
          echo "=== Backend Logs ==="
          docker compose logs backend
          echo "=== Frontend Logs ==="
          docker compose logs frontend

      - name: Cleanup environment
        if: always()
        run: |
          docker compose down -v
          docker system prune -f

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Backend dependency security scan
        run: |
          uv pip install safety
          uv run safety check --json || echo "Security vulnerabilities found (warning)"
        continue-on-error: true

      - name: Frontend dependency security scan
        run: |
          cd frontend
          npm audit --audit-level=critical || exit 1

      - name: Dockerfile security scan
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: backend/Dockerfile
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [backend-unit-test, backend-integration-test, frontend-test, docker-test, security-scan]
    if: always()

    steps:
      - name: Check if all tests passed
        if: |
          needs.backend-unit-test.result != 'success' ||
          needs.backend-integration-test.result != 'success' ||
          needs.frontend-test.result != 'success' ||
          needs.docker-test.result != 'success' ||
          needs.security-scan.result == 'failure'
        run: |
          echo "Test Results:"
          echo "  Backend unit tests: ${{ needs.backend-unit-test.result }}"
          echo "  Backend integration tests: ${{ needs.backend-integration-test.result }}"
          echo "  Frontend tests: ${{ needs.frontend-test.result }}"
          echo "  Docker environment tests: ${{ needs.docker-test.result }}"
          echo "  Security scan: ${{ needs.security-scan.result }}"
          echo "Some tests failed!"
          exit 1

      - name: All tests passed
        if: |
          needs.backend-unit-test.result == 'success' &&
          needs.backend-integration-test.result == 'success' &&
          needs.frontend-test.result == 'success' &&
          needs.docker-test.result == 'success' &&
          needs.security-scan.result != 'failure'
        run: echo "All tests passed!"

  # ================================
  # Stage 2: Build & Push Docker Images
  # Only on push to main (not PRs, not develop)
  # ================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-summary]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================
  # Stage 3: Deploy to Staging
  # Only after successful build on main
  # ================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push]

    steps:
      - name: Deploy to staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/opt/banana-slides' }}"
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TAG="sha-${SHORT_SHA}"
            cd "$DEPLOY_PATH"

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            docker pull ${{ env.BACKEND_IMAGE }}:${TAG}
            docker pull ${{ env.FRONTEND_IMAGE }}:${TAG}

            DEPLOY_TAG=${TAG} docker compose -p banana-staging -f docker-compose.staging.yml down --remove-orphans || true
            docker rm -f banana-slides-backend-staging banana-slides-frontend-staging 2>/dev/null || true
            DEPLOY_TAG=${TAG} docker compose -p banana-staging -f docker-compose.staging.yml up -d

            echo "Staging deployed with tag: ${TAG}"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "Waiting for staging services to start..."
            sleep 15

            for i in $(seq 1 10); do
              if curl -sf http://localhost:5002/health > /dev/null 2>&1; then
                echo "Backend health check passed"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "ERROR: Backend health check failed after 10 attempts"
                docker compose -p banana-staging -f ${{ secrets.DEPLOY_PATH || '/opt/banana-slides' }}/docker-compose.staging.yml logs backend
                exit 1
              fi
              sleep 5
            done

            HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' http://localhost:3002 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend health check passed (HTTP ${HTTP_CODE})"
            else
              echo "ERROR: Frontend returned HTTP ${HTTP_CODE}"
              exit 1
            fi

            echo "Staging deployment verified!"
