name: Deploy to Production

# 触发条件：推送到 main 分支或手动触发
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_build:
        description: '跳过构建，直接使用最新镜像'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/banana-slides-saas-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/banana-slides-saas-frontend

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}

    permissions:
      contents: read
      packages: write  # 推送到 GHCR 需要此权限

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:saas
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:saas
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            cd ${{ secrets.DEPLOY_PATH || '/opt/banana-slides' }}

            # 登录 GHCR（服务器需要认证才能拉取私有镜像）
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            # 拉取最新镜像（从 GHCR 私有仓库）
            docker pull ${{ env.BACKEND_IMAGE }}:saas
            docker pull ${{ env.FRONTEND_IMAGE }}:saas

            # 停止旧容器
            docker compose -p banana-saas -f docker-compose.saas.yml down || true

            # 启动新容器
            docker compose -p banana-saas -f docker-compose.saas.yml up -d

            # 清理旧镜像
            docker image prune -f

            echo "✅ Deployment completed (images from GHCR private registry)!"
