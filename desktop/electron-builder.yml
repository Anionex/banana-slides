appId: com.banana.slides
productName: Banana Slides

directories:
  output: C:\tmp\banana-build\desktop\dist
  buildResources: resources

files:
  - "main.js"
  - "python-manager.js"
  - "preload.js"
  - "auto-updater.js"
  - "update-policy.js"
  - "build-meta.json"
  - "splash.html"
  - "logo.png"
  - "resources/icon.ico"
  - "resources/icon.png"
  - "package.json"
  - "node_modules/**/*"

extraResources:
  - from: "resources/icon.ico"
    to: "icon.ico"
  - from: "resources/icon.png"
    to: "icon.png"
  - from: "../backend/"
    to: "backend"
    filter:
      - "**/*"
      - "!.venv/**"
      - "!__pycache__/**"
      - "!**/__pycache__/**"
      - "!*.pyc"
  - from: "../frontend/dist/"
    to: "frontend"
    filter:
      - "**/*"

icon: resources/icon

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "BananaSlides-${version}-Setup.${ext}"

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: "BananaSlides-${version}.${ext}"

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Office
  artifactName: "BananaSlides-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "Banana Slides"
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerSidebar: resources/installerSidebar.bmp
  installerHeader: resources/installerHeader.bmp

compression: normal
